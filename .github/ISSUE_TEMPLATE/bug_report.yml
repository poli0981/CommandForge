name: Bug report
description: Report a problem with CommandForge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Get straight to the point** — vague or off-topic reports may be
        closed (see [CONTRIBUTING.md](../blob/main/.github/CONTRIBUTING.md)).
        **Do not report security vulnerabilities here** — use
        [private reporting](../security/advisories/new) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Run command …
        3. See …
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: CommandForge version
      description: Settings → About (e.g. 1.0.0)
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version / build
      description: e.g. Windows 11 23H2 (22631) — run `winver`
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: |
        Optionally attach exported logs (Tools → Export logs). **Review them first** — they may
        contain machine-specific paths/names. Do not paste secrets.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I'm using the latest release.
          required: true
        - label: This is not a security vulnerability (those go through private reporting).
          required: true
