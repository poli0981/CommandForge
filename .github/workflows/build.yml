name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # WPF (net10.0-windows) only builds on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CommandForge.slnx

      - name: Verify formatting
        run: dotnet format CommandForge.slnx --verify-no-changes --no-restore

      - name: Build (Release, warnings = errors)
        run: dotnet build CommandForge.slnx -c Release --no-restore

      - name: Test
        run: dotnet test CommandForge.slnx -c Release --no-build
